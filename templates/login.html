<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='logo.png') }}"
    />

<title>Admin Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #2a5298;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.login-box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    font-size: 16px;
}

input {
    border: 1px solid #ccc;
}

button {
    border: none;
    background: #2a5298;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

.error {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>🔐 Admin Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
