<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a5298;
            color: white;
            padding: 15px;
            border-radius: 10px;
        }

        .stats {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #2a5298;
            color: white;
        }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete {
            background: red;
            color: white;
        }

        .logout {
            background: #ff4444;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>📊 Admin Dashboard</h2>
    <a href="/logout"><button class="btn logout">Logout</button></a>
</div>

<div class="stats">
    <h3>Total Members: {{ total }}</h3>
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Phone</th>
        <th>WhatsApp</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for m in members %}
    <tr>
        <td>{{ m[0] }}</td>
        <td>{{ m[1] }}</td>
        <td>{{ m[2] }}</td>
        <td>{{ m[3] }}</td>
        <td>{{ m[4] }}</td>
        <td>{{ m[5] }}</td>
        <td>
            <a href="/delete/{{ m[0] }}">
                <button class="btn delete">Delete</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
